<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contingent Encounters</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family: Arial, Helvetica, sans-serif;
    color:white;

    min-height:100vh;

    background-image:url("glass.jpg");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    overflow:hidden;

}

/* Darken the background */

body::before{

    content:"";

    position:fixed;
    inset:0;

    background:rgba(0,0,0,.45);

    z-index:-2;

}

/* Entire page */

.page{

    position:relative;

    width:100vw;
    height:100vh;

}

/* Shared panel style */

.panel{

    background:rgba(0,0,0,.82);

    border:2px solid white;

    border-radius:16px;

    backdrop-filter:blur(8px);

}

/* ----------------------- */
/* TOP NAVIGATION */
/* ----------------------- */

.topnav{

    position:absolute;

    top:45px;
    left:50%;

    transform:translateX(-50%);

    display:flex;
    gap:80px;

}

.topnav a{

    text-decoration:none;

    color:white;

    padding:14px 40px;

    font-size:24px;

}

.topnav a:hover{

    background:white;
    color:black;

}

/* ----------------------- */
/* ABOUT */
/* ----------------------- */

.about{

    position:absolute;

    right:45px;
    top:45px;

    text-decoration:none;

    color:white;

    padding:12px 25px;

    font-size:22px;

}

/* ----------------------- */
/* LEFT MENU */
/* ----------------------- */

.library{

    position:absolute;

    left:80px;
    top:180px;

    width:240px;

    padding:25px;

}

.library h2{

    margin-bottom:20px;

}

.library ul{

    list-style:none;

    line-height:2;

    font-size:22px;

}

/* ----------------------- */
/* PORTRAIT */
/* ----------------------- */

.portrait{

    position:absolute;

    left:50%;
    top:52%;

    transform:translate(-50%,-50%);

    width:360px;
    height:360px;

    border-radius:50%;

    overflow:hidden;

    border:4px solid white;

    background:black;

}

.portrait img{

    width:100%;
    height:100%;

    object-fit:cover;

}

/* ----------------------- */
/* RIGHT MENU */
/* ----------------------- */

.right{

    position:absolute;

    right:80px;
    top:250px;

    display:flex;
    flex-direction:column;
    gap:20px;

}

.right a{

    width:160px;

    text-align:center;

    padding:20px;

    text-decoration:none;

    color:white;

    font-size:22px;

}

.right a:hover{

    background:white;
    color:black;

}

/* ----------------------- */
/* LOWER LEFT */
/* ----------------------- */

.blog{

    position:absolute;

    left:80px;
    bottom:120px;

    padding:18px 25px;

    text-decoration:none;

    color:white;

    font-size:22px;

}

.mastodon{

    position:absolute;

    left:80px;
    bottom:45px;

    padding:16px 25px;

    text-decoration:none;

    color:white;

    font-size:22px;

}

/* ----------------------- */
/* LOWER CENTER */
/* ----------------------- */

.bottom{

    position:absolute;

    bottom:45px;

    left:50%;

    transform:translateX(-50%);

    display:flex;
    gap:35px;

}

.bottom a{

    padding:16px 35px;

    text-decoration:none;

    color:white;

    font-size:22px;

}

.bottom a:hover{

    background:white;
    color:black;

}

/* ----------------------- */
/* SIGNATURE */
/* ----------------------- */

.signature{

    position:absolute;

    right:80px;
    bottom:55px;

    text-align:right;

    font-size:26px;

    text-shadow:0 0 10px black;

}

</style>
</head>

<body>

<div class="page">

    <div class="topnav">

        <a class="panel" href="#">Philosophy</a>
        <a class="panel" href="#">Science</a>
        <a class="panel" href="#">Art</a>

    </div>

    <a href="#" class="about panel">About Me</a>

    <div class="library panel">

        <h2>Philosophy</h2>

        <ul>

            <li>→ Books</li>
            <li>Outlines</li>
            <li>Old Essays</li>

        </ul>

    </div>

    <div class="portrait">

        <!-- Replace portrait.jpg with your picture -->

        <img src="portrait.jpg" alt="Portrait">

    </div>

    <div class="right">

        <a class="panel" href="#">YT / TW</a>

        <a class="panel" href="#">Games</a>

    </div>

    <a class="blog panel" href="#">Blog · XMPP · Forums</a>

    <a class="mastodon panel" href="#">Mastodon</a>

    <div class="bottom">

        <a class="panel" href="#">Substack</a>

        <a class="panel" href="#">Patreon</a>

    </div>

    <div class="signature">

        <strong>Contingent Encounters</strong><br>
        by Austin Reddy

    </div>

</div>

</body>
</html>
